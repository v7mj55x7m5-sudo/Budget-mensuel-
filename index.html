<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#06070a">
<title>Budget Mobile Premium v7</title>
<style>
:root{color-scheme:dark;--bg:#06070a;--card:#111820;--card2:#17202b;--line:#26303d;--txt:#f4f6f3;--mut:#9aa19a;--dim:#5d665f;--acc:#a4ff3d;--green:#45d66f;--red:#ff4545;--orange:#ff9f2e;--yellow:#ffd447;--blue:#42a5ff;--purple:#a06cff;--cyan:#3ee8d1}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:radial-gradient(circle at top,#101a27,#06070a 48%,#040506);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overscroll-behavior:none}
button,input,select{font:inherit}button{border:0;background:none;color:inherit}input,select{width:100%;background:#10161f;color:var(--txt);border:1px solid var(--line);border-radius:13px;padding:12px;outline:none}
.hdr{position:sticky;top:0;z-index:50;background:rgba(7,9,12,.96);backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,.06);padding:14px 16px 8px}
.hdrTop{display:flex;justify-content:space-between;align-items:center}.brand{font-size:24px;font-weight:950;color:var(--acc);letter-spacing:-.7px}.pill{border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:6px 12px;color:var(--mut);font-size:12px;font-weight:900;background:rgba(255,255,255,.04)}.monthTitle{margin-top:2px;color:var(--mut);font-weight:850;font-size:13px}
.tabs{position:sticky;top:64px;z-index:49;display:flex;overflow:auto;background:rgba(7,9,12,.96);border-bottom:1px solid rgba(255,255,255,.06);scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}.tab{flex:0 0 auto;padding:11px 16px;color:var(--dim);font-size:12px;font-weight:950;letter-spacing:1px;border-bottom:3px solid transparent}.tab.active{color:var(--acc);border-bottom-color:var(--acc)}
.page{display:none;max-width:560px;margin:0 auto;padding:14px 12px 100px;gap:13px;flex-direction:column}.page.active{display:flex}
.nav{position:fixed;left:0;right:0;bottom:0;z-index:60;background:rgba(7,9,12,.98);backdrop-filter:blur(18px);border-top:1px solid rgba(255,255,255,.08);display:flex;padding-bottom:env(safe-area-inset-bottom)}.nav button{flex:1;padding:8px 0 7px;color:var(--dim);font-size:11px;font-weight:900;display:flex;flex-direction:column;gap:2px;align-items:center}.nav .ico{font-size:22px}.nav button.active{color:var(--acc)}
.card{background:linear-gradient(180deg,rgba(22,28,36,.96),rgba(12,16,22,.98));border:1px solid rgba(255,255,255,.08);border-radius:20px;box-shadow:0 14px 35px rgba(0,0,0,.28);overflow:hidden}.body{padding:16px}.title{font-size:12px;font-weight:950;color:#cfd6cf;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:13px}.sub{color:var(--mut);font-size:12px}.row{display:flex;align-items:center;gap:10px;min-height:60px;padding:11px 14px;border-top:1px solid rgba(255,255,255,.06)}.row:first-child{border-top:0}.row.done{opacity:.48}.ck{width:25px;height:25px;border-radius:50%;border:2px solid var(--dim);display:flex;align-items:center;justify-content:center;flex-shrink:0}.ck.on{background:var(--green);border-color:var(--green)}.rmain{flex:1;min-width:0}.rname{font-size:15px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}.tag{font-size:10px;font-weight:900;color:var(--mut);background:rgba(255,255,255,.08);border-radius:999px;padding:3px 8px}.tg{color:var(--green);background:rgba(69,214,111,.12)}.tr{color:var(--red);background:rgba(255,69,69,.13)}.ty{color:var(--orange);background:rgba(255,159,46,.13)}
.amount{width:90px;text-align:right;font-weight:950;font-size:16px}.green{color:var(--green)}.red{color:var(--red)}.orange{color:var(--orange)}.cyan{color:var(--cyan)}.big{font-size:36px;font-weight:950;line-height:1;letter-spacing:-1px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.mini{padding:14px;border-radius:17px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)}.mini .l{font-size:10px;color:var(--mut);font-weight:950;letter-spacing:1px;text-transform:uppercase}.mini .v{margin-top:5px;font-size:19px;font-weight:950}.hero{background:radial-gradient(circle at 90% 0,rgba(164,255,61,.22),transparent 42%),linear-gradient(135deg,#092114,#0b1511 55%,#08090b);border-color:rgba(164,255,61,.23)}.progress{height:10px;background:rgba(255,255,255,.09);border-radius:99px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,var(--green),var(--acc));border-radius:99px}.secH{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:rgba(255,255,255,.04)}.secL{font-size:12px;font-weight:950;color:var(--mut);text-transform:uppercase;letter-spacing:1px}.secV{font-size:21px;font-weight:950}.add{width:100%;padding:14px 16px;text-align:left;color:var(--dim);font-weight:900;border-top:1px solid rgba(255,255,255,.06)}
.chart{width:100%;overflow:hidden}.legend{display:grid;gap:8px}.leg{display:flex;align-items:center;gap:9px;font-size:13px}.dot{width:10px;height:10px;border-radius:50%}.legName{flex:1;color:var(--mut)}.legVal{font-weight:950}.heat{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}.hcell{aspect-ratio:1;border-radius:11px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.08);font-weight:950}.hcell:active,.tap:active{transform:scale(.97)}.tap{cursor:pointer}
.modal{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.78);align-items:flex-end;justify-content:center}.modal.open{display:flex}.sheet{width:100%;max-width:560px;max-height:90vh;overflow:auto;background:#121820;border:1px solid rgba(255,255,255,.08);border-radius:24px 24px 0 0;padding:18px 16px calc(24px + env(safe-area-inset-bottom))}.handle{width:42px;height:4px;border-radius:9px;background:#39414c;margin:0 auto 16px}.mt{font-size:20px;font-weight:950;color:var(--acc);margin-bottom:14px}.field{margin-bottom:12px}.field label{display:block;color:var(--dim);font-size:11px;font-weight:950;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}.btns{display:flex;gap:10px;margin-top:16px}.btn{flex:1;padding:14px;border-radius:14px;font-weight:950;background:#252d38}.primary{background:var(--acc);color:#071008}.danger{background:var(--red);color:white}.toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:#202833;border:1px solid #394350;border-radius:999px;padding:10px 18px;font-weight:900;z-index:130;opacity:0;transition:.25s;white-space:nowrap}.toast.show{opacity:1}
.popupLine{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.06)}.popupLine:last-child{border-bottom:0}.smallBtn{padding:9px 11px;border-radius:12px;background:rgba(255,255,255,.07);font-weight:900;color:var(--acc)}
@media(min-width:700px){.page{max-width:720px}.gridWide{display:grid;grid-template-columns:1fr 1fr;gap:12px}.gridWide>.card{height:100%}}
</style>
</head>
<body>
<header class="hdr"><div class="hdrTop"><div class="brand">Budget 💸</div><div class="pill" id="datePill"></div></div><div class="monthTitle" id="monthTitle"></div></header>
<div class="tabs" id="tabs"></div>
<main class="page active" id="home"></main>
<main class="page" id="transactions"></main>
<main class="page" id="stats"></main>
<main class="page" id="settings"></main>
<nav class="nav">
<button class="active" data-page="home"><span class="ico">🏠</span><span>Accueil</span></button>
<button data-page="transactions"><span class="ico">💳</span><span>Transactions</span></button>
<button data-page="stats"><span class="ico">📊</span><span>Stats</span></button>
<button data-page="settings"><span class="ico">⚙️</span><span>Réglages</span></button>
</nav>
<div class="modal" id="editModal"><div class="sheet"><div class="handle"></div><div class="mt" id="editTitle">Ajouter</div><div class="field"><label>Libellé</label><input id="eName"></div><div class="grid2"><div class="field"><label>Montant</label><input id="eAmount" type="number" inputmode="decimal"></div><div class="field"><label>Catégorie</label><select id="eCat"></select></div></div><div class="field"><label>Date</label><input id="eDate" type="date"></div><div class="btns"><button class="btn" onclick="closeEdit()">Annuler</button><button class="btn danger" id="deleteBtn" onclick="deleteEdit()">Supprimer</button><button class="btn primary" onclick="saveEdit()">Valider</button></div></div></div>
<div class="modal" id="popup"><div class="sheet"><div class="handle"></div><div class="mt" id="popTitle">Détail</div><div id="popBody"></div><div class="btns"><button class="btn primary" onclick="closePopup()">OK</button></div></div></div>
<div class="toast" id="toast"></div>
<script>
const ML=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'],MS=['JAN','FEV','MAR','AVR','MAI','JUN','JUL','AOU','SEP','OCT','NOV','DEC'];
const CATS={credits:['Crédits','💳','#ff7b3d'],transport:['Transport','🚗','#ff4545'],alimentation:['Alimentation','🛒','#ffd447'],assurances:['Assurances','🛡️','#3ee8d1'],abonnements:['Abonnements','📱','#a06cff'],enfants:['Enfants','👶','#ff5ca8'],logement:['Logement','🏠','#42a5ff'],sante:['Santé','💊','#ff78b8'],loisirs:['Loisirs','🎬','#45d66f'],autres:['Autres','📦','#8c96a3']};
let month=(new Date()).getMonth(),page='home',edit=null;
let app=load();
function load(){let d;try{d=JSON.parse(localStorage.getItem('budget_mobile_v7')||'null')}catch(e){};if(!d){d={settings:{mode:'rapide',salaryDay:1,savingsTarget:30000,savingsMonthly:1000,savingsCapital:4000},months:{}}}
 for(let i=0;i<12;i++){if(!d.months[i])d.months[i]=seed(i);d.months[i].income=(d.months[i].income||[]).map(fix);d.months[i].expenses=(d.months[i].expenses||[]).map(fix);if(!d.months[i].savings)d.months[i].savings=0}
 return d}
function seed(i){return{income:[{name:'Salaire',amount:i===4?1600:0,date:'',cat:'autres',paid:true,auto:true},{name:'Revenus supplémentaires',amount:0,date:'',cat:'autres',paid:false}],expenses:[['Découvert',300,'credits',1],['Supermarché',150,'alimentation',17],['Pneu feu vert',104,'transport',15],['Vêtement ski',103,'enfants',16],['Essence',100,'transport',5],['Assurance voiture',99,'assurances',17],['Free mobile',19.99,'abonnements',12]].map(x=>({name:x[0],amount:i===4?x[1]:0,cat:x[2],date:dateFor(i,x[3]),paid:x[3]<new Date().getDate()&&i===new Date().getMonth()})),savings:i===4?0:0}}
function fix(r){r.amount=+r.amount||0;r.cat=r.cat||guess(r.name);r.date=r.date||'';r.paid=!!r.paid;return r}
function save(){localStorage.setItem('budget_mobile_v7',JSON.stringify(app))}
function p2(n){return String(n).padStart(2,'0')}function dateFor(m,d){return new Date().getFullYear()+'-'+p2(m+1)+'-'+p2(d)}function eur(n){return(+n||0).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'}function short(n){n=+n||0;return Math.abs(n)>=1000?(n/1000).toFixed(1)+'k €':eur(n)}function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}function guess(n){n=(n||'').toLowerCase();if(/credit|découvert|cetelem|natixis/.test(n))return'credits';if(/essence|voiture|transport|pneu/.test(n))return'transport';if(/super|course|aliment/.test(n))return'alimentation';if(/assurance|mutuelle/.test(n))return'assurances';if(/free|netflix|apple|abonnement|chat/.test(n))return'abonnements';if(/enfant|cantine|ski|vêtement/.test(n))return'enfants';if(/loyer|logement|eau|gaz|élec/.test(n))return'logement';return'autres'}
function totals(m=month){let mo=app.months[m],income=mo.income.reduce((s,r)=>s+(+r.amount||0),0),expenses=mo.expenses.reduce((s,r)=>s+(+r.amount||0),0),paidEx=mo.expenses.filter(r=>r.paid).reduce((s,r)=>s+r.amount,0),sav=+mo.savings||0;return{income,expenses,paidEx,sav,remain:income-expenses-sav,pct:income?expenses/income*100:0}}
function dayData(day){let mo=app.months[month],ds=dateFor(month,day),inc=mo.income.filter(r=>(r.date||dateFor(month,app.settings.salaryDay||1))===ds),ex=mo.expenses.filter(r=>r.date===ds),income=inc.reduce((s,r)=>s+r.amount,0),expenses=ex.reduce((s,r)=>s+r.amount,0);return{day,ds,inc,ex,income,expenses,balance:income-expenses}}
function render(){renderHeader();renderTabs();document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById(page).classList.add('active');document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===page));if(page==='home')home();if(page==='transactions')transactions();if(page==='stats')stats();if(page==='settings')settings();save()}
function renderHeader(){let n=new Date(),j=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];datePill.textContent=j[n.getDay()]+' '+p2(n.getDate())+' '+ML[n.getMonth()].slice(0,3);monthTitle.textContent=ML[month]+(month===n.getMonth()?' - Mois en cours':'')}
function renderTabs(){tabs.innerHTML=MS.map((x,i)=>`<button class="tab ${i===month?'active':''}" onclick="month=${i};render()">${x}</button>`).join('')}
function home(){let t=totals(),pct=Math.min(100,Math.round(t.pct)),cap=app.settings.savingsCapital+(Object.values(app.months).reduce((s,m)=>s+(+m.savings||0),0));home.innerHTML=`
<section class="card hero"><div class="body"><div class="title">Solde restant prévu</div><div class="big ${t.remain<0?'red':'green'}">${eur(t.remain)}</div><div class="sub" style="margin-top:8px">Revenus - dépenses - épargne du mois</div></div></section>
<div class="grid3"><div class="mini"><div class="l">Revenus</div><div class="v green">${short(t.income)}</div></div><div class="mini"><div class="l">Dépenses</div><div class="v red">${short(t.expenses)}</div></div><div class="mini"><div class="l">Épargne</div><div class="v cyan">${short(t.sav)}</div></div></div>
<section class="card"><div class="body"><div class="title">Bilan rapide du mois</div><div class="popupLine"><span>Dépenses / revenus</span><b class="${pct>90?'red':pct>75?'orange':'green'}">${pct}%</b></div><div class="progress" style="margin:10px 0"><div class="fill" style="width:${pct}%;background:linear-gradient(90deg,var(--green),${pct>90?'var(--red)':pct>75?'var(--orange)':'var(--acc)'})"></div></div><div class="sub">${pct>90?'Attention : tu es proche ou au-dessus de tes revenus.':pct>75?'Budget à surveiller.':'Budget maîtrisé pour le moment.'}</div></div></section>
<section class="card"><div class="body"><div class="title">Épargne globale</div><div class="grid3"><div class="mini"><div class="l">Capital</div><div class="v green">${eur(cap)}</div></div><div class="mini"><div class="l">Reste</div><div class="v orange">${eur(Math.max(0,app.settings.savingsTarget-cap))}</div></div><div class="mini"><div class="l">Rythme</div><div class="v cyan">${eur(app.settings.savingsMonthly)}/mois</div></div></div><div class="progress" style="margin-top:12px"><div class="fill" style="width:${Math.min(100,cap/app.settings.savingsTarget*100)}%"></div></div></div></section>
<section class="card"><div class="body"><div class="title">Prochaines dépenses</div>${nextExpenses().map(r=>`<div class="popupLine"><span>${esc(r.name)} <span class="sub">${r.date?dateFR(r.date):''}</span></span><b class="red">${eur(r.amount)}</b></div>`).join('')||'<div class="sub">Aucune dépense à venir.</div>'}</div></section>
<section class="card"><div class="body"><div class="title">Résumé automatique</div><div class="popupLine"><span>Plus gros poste</span><b>${topCat()}</b></div><div class="popupLine"><span>Jour le plus cher</span><b>${bigDay()}</b></div><div class="popupLine"><span>Mode actuel</span><b class="green">${app.settings.mode==='rapide'?'Rapide':'Avancé'}</b></div></div></section>`}
function nextExpenses(){let today=new Date();today.setHours(0,0,0,0);return app.months[month].expenses.filter(r=>r.amount&&!r.paid&&(!r.date||new Date(r.date)>=today)).sort((a,b)=>(a.date||'9999').localeCompare(b.date||'9999')).slice(0,5)}
function dateFR(s){if(!s)return'';let p=s.split('-');return p[2]+'/'+p[1]}function topCat(){let c=byCat(),k=Object.keys(c).sort((a,b)=>c[b]-c[a])[0];return k?CATS[k][1]+' '+CATS[k][0]:'—'}function bigDay(){let max=0,d='—';for(let i=1;i<=31;i++){let x=dayData(i);if(x.expenses>max){max=x.expenses;d=i+' · '+eur(max)}}return d}
function transactions(){let m=app.months[month],t=totals();transactions.innerHTML=section('Revenus',t.income,'green',m.income,'income')+`<section class="card"><div class="secH"><span class="secL">Épargne du mois</span><span class="secV cyan">${eur(m.savings)}</span></div><div class="row"><div class="rmain"><div class="rname">Versement épargne volontaire</div><div class="tags"><span class="tag tg">Projection active</span></div></div><input class="amount cyan" type="number" value="${m.savings||''}" onchange="app.months[month].savings=+this.value||0;render()"></div></section>`+section('Dépenses',t.expenses,'red',m.expenses,'expense')}
function section(label,total,cls,rows,type){return`<section class="card"><div class="secH"><span class="secL">${label}</span><span class="secV ${cls}">${eur(total)}</span></div>${rows.map((r,i)=>row(r,i,type)).join('')}<button class="add" onclick="openEdit('${type}',-1)">+ Ajouter ${type==='income'?'un revenu':'une dépense'}</button></section>`}
function row(r,i,type){let cat=CATS[r.cat]||CATS.autres;let salary=type==='income'&&/salaire/i.test(r.name);return`<div class="row ${r.paid?'done':''}"><button class="ck ${r.paid||salary?'on':''}" onclick="${salary?'toastMsg(`Salaire automatique`)':`togglePaid('${type}',${i})`}">${r.paid||salary?'✓':''}</button><div class="rmain tap" onclick="openEdit('${type}',${i})"><div class="rname">${esc(r.name)}</div><div class="tags"><span class="tag ${salary?'tg':''}">${salary?'Automatique':(r.paid?'Payé':'Prévu')}</span>${type==='expense'?`<span class="tag">${cat[1]} ${cat[0]}</span>`:''}${r.date?`<span class="tag">${dateFR(r.date)}</span>`:'<span class="tag ty">Date auto</span>'}</div></div><input class="amount ${type==='income'?'green':r.amount>=100?'red':'orange'}" type="number" value="${r.amount||''}" onchange="changeAmount('${type}',${i},this.value)"></div>`}
function stats(){let t=totals(),cats=byCat(),flow=monthFlow();stats.innerHTML=`
<section class="card"><div class="body"><div class="title">Évolution de l’épargne</div>${savingsChart()}</div></section>
<section class="card"><div class="body"><div class="title">Revenus vs dépenses</div>${barChart(t.income,t.expenses)}</div></section>
<section class="card"><div class="body"><div class="title">Répartition par catégorie</div><div style="display:flex;gap:16px;align-items:center">${donut(cats)}<div class="legend">${Object.keys(cats).sort((a,b)=>cats[b]-cats[a]).map(k=>`<div class="leg tap" onclick="catPopup('${k}')"><span class="dot" style="background:${CATS[k][2]}"></span><span class="legName">${CATS[k][0]}</span><span class="legVal">${Math.round(cats[k]/Math.max(1,t.expenses)*100)}%</span></div>`).join('')}</div></div></div></section>
<section class="card"><div class="body"><div class="title">Heatmap des dépenses</div>${heat()}</div></section>
<section class="card"><div class="body"><div class="title">Top 5 dépenses</div>${app.months[month].expenses.filter(r=>r.amount).sort((a,b)=>b.amount-a.amount).slice(0,5).map((r,i)=>`<div class="popupLine tap" onclick="expensePopup('${esc(r.name)}',${r.amount},'${r.date||''}','${r.cat}')"><span>${i+1}. ${esc(r.name)}</span><b class="red">${eur(r.amount)}</b></div>`).join('')}</div></section>`}
function monthFlow(){let days=new Date(new Date().getFullYear(),month+1,0).getDate(),arr=[];for(let d=1;d<=days;d++)arr.push(dayData(d));return arr}
function savingsChart(){let cap=app.settings.savingsCapital,pts=[];for(let i=0;i<12;i++){cap+=+app.months[i].savings||0;pts.push({m:i,v:cap})}let max=Math.max(app.settings.savingsTarget,...pts.map(x=>x.v),1),W=330,H=210,P=34,path=pts.map((p,i)=>`${i?'L':'M'} ${P+i*(W-2*P)/11} ${H-P-p.v/max*(H-2*P)}`).join(' ');let targetY=H-P-app.settings.savingsTarget/max*(H-2*P);return`<svg class="chart" viewBox="0 0 ${W} ${H}" width="100%"><line x1="${P}" x2="${W-P}" y1="${targetY}" y2="${targetY}" stroke="#ff9f2e" stroke-dasharray="5 5"/><path d="${path}" fill="none" stroke="#a4ff3d" stroke-width="4" stroke-linecap="round"/>${pts.map((p,i)=>{let x=P+i*(W-2*P)/11,y=H-P-p.v/max*(H-2*P);return`<circle class="tap" onclick="savingPopup(${i},${p.v})" cx="${x}" cy="${y}" r="${i===month?7:5}" fill="#a4ff3d" stroke="#06070a" stroke-width="2"/>`}).join('')}<text x="${W-P-10}" y="${targetY-6}" fill="#ff9f2e" font-size="10" font-weight="900">Obj. ${short(app.settings.savingsTarget)}</text></svg><div class="sub">Touchez un point pour voir le détail du mois.</div>`}
function barChart(income,expenses){let max=Math.max(1,income,expenses),ih=income/max*120,eh=expenses/max*120;return`<svg class="chart" viewBox="0 0 330 200" width="100%"><line x1="40" x2="300" y1="160" y2="160" stroke="rgba(255,255,255,.16)"/><rect class="tap" onclick="barPopup('revenus')" x="80" y="${160-ih}" width="64" height="${ih}" rx="10" fill="#45d66f"/><rect class="tap" onclick="barPopup('dépenses')" x="190" y="${160-eh}" width="64" height="${eh}" rx="10" fill="#ff4545"/><text x="112" y="${145-ih}" text-anchor="middle" fill="#45d66f" font-size="13" font-weight="900">${eur(income)}</text><text x="222" y="${145-eh}" text-anchor="middle" fill="#ff4545" font-size="13" font-weight="900">${eur(expenses)}</text><text x="112" y="186" text-anchor="middle" fill="#9aa19a">Revenus</text><text x="222" y="186" text-anchor="middle" fill="#9aa19a">Dépenses</text></svg><div class="sub">Touchez une barre pour voir le détail.</div>`}
function byCat(){let o={};app.months[month].expenses.forEach(r=>{if(r.amount)o[r.cat]=(o[r.cat]||0)+r.amount});return o}
function donut(cats){let keys=Object.keys(cats),total=keys.reduce((s,k)=>s+cats[k],0);if(!total)return'<div class="sub">Aucune donnée</div>';let c=80,r=70,start=-Math.PI/2,paths='';keys.forEach(k=>{let a=cats[k]/total*Math.PI*2,end=start+a,x1=c+r*Math.cos(start),y1=c+r*Math.sin(start),x2=c+r*Math.cos(end),y2=c+r*Math.sin(end);paths+=`<path class="tap" onclick="catPopup('${k}')" d="M${c},${c} L${x1},${y1} A${r},${r} 0 ${a>Math.PI?1:0},1 ${x2},${y2} Z" fill="${CATS[k][2]}" stroke="#10141b" stroke-width="2"/>`;start=end});return`<svg width="160" height="160" viewBox="0 0 160 160">${paths}<circle cx="80" cy="80" r="42" fill="#10141b"/><text x="80" y="78" text-anchor="middle" fill="#fff" font-size="18" font-weight="950">${short(total)}</text><text x="80" y="98" text-anchor="middle" fill="#9aa19a" font-size="11">Total</text></svg>`}
function heat(){let days=new Date(new Date().getFullYear(),month+1,0).getDate(),max=1,data=[];for(let d=1;d<=days;d++){let x=dayData(d);data.push(x);max=Math.max(max,x.expenses)}return`<div class="heat">${data.map(x=>{let p=x.expenses/max,col=p===0?'rgba(255,255,255,.04)':p<.25?'rgba(69,214,111,.55)':p<.5?'rgba(255,212,71,.65)':p<.75?'rgba(255,159,46,.75)':'rgba(255,69,69,.85)';return`<button class="hcell tap" onclick="dayPopup(${x.day})" style="background:${col}">${x.day}</button>`}).join('')}</div><div style="display:flex;justify-content:space-between;margin-top:10px" class="sub"><span>Faible</span><span>Élevé</span></div>`}
function settings(){settings.innerHTML=`<section class="card"><div class="body"><div class="title">Mode d’utilisation</div><div class="grid2"><button class="mini tap" onclick="app.settings.mode='rapide';render()"><div class="l">⚡ Mode rapide</div><div class="v ${app.settings.mode==='rapide'?'green':''}">Recommandé</div><div class="sub">Dates auto et saisie simplifiée.</div></button><button class="mini tap" onclick="app.settings.mode='avance';render()"><div class="l">🎚️ Mode avancé</div><div class="v ${app.settings.mode==='avance'?'green':''}">Précis</div><div class="sub">Contrôle total des dates.</div></button></div></div></section>
<section class="card"><div class="body"><div class="title">Réglages rapides</div><div class="field"><label>Jour de salaire automatique</label><input type="number" min="1" max="31" value="${app.settings.salaryDay}" onchange="app.settings.salaryDay=+this.value||1;render()"></div><div class="field"><label>Capital épargne de départ</label><input type="number" value="${app.settings.savingsCapital}" onchange="app.settings.savingsCapital=+this.value||0;render()"></div><div class="field"><label>Objectif épargne</label><input type="number" value="${app.settings.savingsTarget}" onchange="app.settings.savingsTarget=+this.value||0;render()"></div><div class="field"><label>Rythme mensuel</label><input type="number" value="${app.settings.savingsMonthly}" onchange="app.settings.savingsMonthly=+this.value||0;render()"></div></div></section>
<section class="card"><div class="body"><div class="title">Données</div><button class="smallBtn" onclick="prepareMonth()">Préparer le mois suivant</button> <button class="smallBtn" onclick="exportData()">Exporter</button> <button class="smallBtn" onclick="resetAll()">Tout effacer</button><div class="sub" style="margin-top:10px">Données locales uniquement sur cet appareil.</div></div></section>`}
function openEdit(type,i){edit={type,i};let r=i<0?{name:'',amount:'',cat:'autres',date:''}:app.months[month][type==='income'?'income':'expenses'][i];editTitle.textContent=i<0?'Ajouter':'Modifier';eName.value=r.name||'';eAmount.value=r.amount||'';eDate.value=r.date||'';eCat.innerHTML=Object.keys(CATS).map(k=>`<option value="${k}" ${k===r.cat?'selected':''}>${CATS[k][1]} ${CATS[k][0]}</option>`).join('');deleteBtn.style.display=i<0?'none':'block';editModal.classList.add('open')}
function closeEdit(){editModal.classList.remove('open')}function saveEdit(){let rows=app.months[month][edit.type==='income'?'income':'expenses'];let r={name:eName.value.trim()||'Sans nom',amount:+eAmount.value||0,cat:eCat.value,date:eDate.value||'',paid:false};if(edit.type==='income'&&/salaire/i.test(r.name)){r.paid=true;r.auto=true;r.date=''}if(!r.date&&edit.type==='expense'&&app.settings.mode==='rapide')r.date=dateFor(month,new Date().getDate());if(edit.i<0)rows.push(r);else Object.assign(rows[edit.i],r);closeEdit();render();toastMsg('Enregistré')}
function deleteEdit(){let rows=app.months[month][edit.type==='income'?'income':'expenses'];if(confirm('Supprimer ?')){rows.splice(edit.i,1);closeEdit();render()}}
function changeAmount(type,i,v){let rows=app.months[month][type==='income'?'income':'expenses'];rows[i].amount=+v||0;if(type==='income'&&/salaire/i.test(rows[i].name)){rows[i].paid=true;rows[i].auto=true}render()}
function togglePaid(type,i){let rows=app.months[month][type==='income'?'income':'expenses'];rows[i].paid=!rows[i].paid;render()}
function showPopup(title,html){popTitle.textContent=title;popBody.innerHTML=html;popup.classList.add('open')}function closePopup(){popup.classList.remove('open')}
function dayPopup(d){let x=dayData(d),lines=[`<div class="grid3"><div class="mini"><div class="l">Dépenses</div><div class="v red">${eur(x.expenses)}</div></div><div class="mini"><div class="l">Revenus</div><div class="v green">${eur(x.income)}</div></div><div class="mini"><div class="l">Solde</div><div class="v ${x.balance<0?'red':'green'}">${eur(x.balance)}</div></div></div><div class="title" style="margin-top:14px">Transactions du jour</div>`];let all=[...x.inc.map(r=>({...r,type:'revenu'})),...x.ex.map(r=>({...r,type:'dépense'}))];lines.push(all.map(r=>`<div class="popupLine"><span>${esc(r.name)} <span class="sub">${r.type}</span></span><b class="${r.type==='revenu'?'green':'red'}">${eur(r.amount)}</b></div>`).join('')||'<div class="sub">Aucune transaction ce jour.</div>');showPopup('📅 '+d+' '+ML[month],lines.join(''))}
function barPopup(kind){let rows=kind==='revenus'?app.months[month].income:app.months[month].expenses;showPopup(kind==='revenus'?'Revenus du mois':'Dépenses du mois',rows.filter(r=>r.amount).map(r=>`<div class="popupLine"><span>${esc(r.name)}</span><b class="${kind==='revenus'?'green':'red'}">${eur(r.amount)}</b></div>`).join('')||'<div class="sub">Aucune donnée.</div>')}
function catPopup(k){let rows=app.months[month].expenses.filter(r=>r.cat===k&&r.amount),sum=rows.reduce((s,r)=>s+r.amount,0);showPopup(CATS[k][1]+' '+CATS[k][0],`<div class="grid2"><div class="mini"><div class="l">Total</div><div class="v red">${eur(sum)}</div></div><div class="mini"><div class="l">Transactions</div><div class="v">${rows.length}</div></div></div>`+rows.map(r=>`<div class="popupLine"><span>${esc(r.name)} <span class="sub">${dateFR(r.date)}</span></span><b>${eur(r.amount)}</b></div>`).join(''))}
function savingPopup(i,v){showPopup('Épargne · '+ML[i],`<div class="popupLine"><span>Capital estimé</span><b class="green">${eur(v)}</b></div><div class="popupLine"><span>Objectif</span><b>${eur(app.settings.savingsTarget)}</b></div><div class="popupLine"><span>Avancement</span><b class="cyan">${Math.round(v/Math.max(1,app.settings.savingsTarget)*100)}%</b></div>`)}
function expensePopup(n,a,d,c){showPopup(n,`<div class="popupLine"><span>Montant</span><b class="red">${eur(a)}</b></div><div class="popupLine"><span>Date</span><b>${dateFR(d)||'Non définie'}</b></div><div class="popupLine"><span>Catégorie</span><b>${CATS[c]?.[1]||''} ${CATS[c]?.[0]||c}</b></div>`)}
function prepareMonth(){let n=(month+1)%12;app.months[n].income=app.months[month].income.map(r=>({...r,paid:/salaire/i.test(r.name),date:/salaire/i.test(r.name)?'':r.date}));app.months[n].expenses=app.months[month].expenses.map(r=>({...r,paid:false,date:r.date?shiftDate(r.date,n):''}));month=n;render();toastMsg('Mois préparé')}
function shiftDate(s,m){let p=s.split('-'),y=+p[0];if(+p[1]-1===11&&m===0)y++;let last=new Date(y,m+1,0).getDate();return y+'-'+p2(m+1)+'-'+p2(Math.min(+p[2],last))}
function exportData(){navigator.clipboard?.writeText(JSON.stringify(app,null,2));toastMsg('Données copiées en JSON')}
function resetAll(){if(confirm('Tout effacer ?')){localStorage.removeItem('budget_mobile_v7');app=load();render()}}
function toastMsg(m){toast.textContent=m;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2200)}
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{page=b.dataset.page;render()});
render();
</script>
</body>
</html>
